<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulaire d'Inscription Complet</title>
    <link rel="stylesheet" href="../css/inscription.css">
</head>
<body>

<div class="container">
    <h1>Créer votre compte</h1>
    <p>Veuillez remplir tous les champs ci-dessous pour finaliser votre inscription.</p>

    <form action="#" method="POST">
        
        <!-- Section 1 : Informations Personnelles -->
        <fieldset>
            <legend>Informations Personnelles</legend>
            
            <div class="form-group">
                <label for="firstname">Prénom :</label>
                <input type="text" id="firstname" name="firstname" placeholder="Ex: Jean" required>
            </div>

            <div class="form-group">
                <label for="lastname">Nom :</label>
                <input type="text" id="lastname" name="lastname" placeholder="Ex: Dupont" required>
            </div>

            <div class="form-group">
                <label for="dob">Date de naissance :</label>
                <input type="date" id="dob" name="dob" required>
            </div>

            <div class="form-group">
                <label>Genre :</label>
                <div class="radio-group">
                    <input type="radio" id="male" name="gender" value="m">
                    <label for="male">Homme</label>
                    <input type="radio" id="female" name="gender" value="f">
                    <label for="female">Femme</label>
                    <input type="radio" id="other" name="gender" value="o">
                    <label for="other">Autre</label>
                </div>
            </div>

            <div class="form-group">
                <label for="bio">Biographie courte :</label>
                <textarea id="bio" name="bio" rows="4" placeholder="Parlez-nous un peu de vous..."></textarea>
            </div>
        </fieldset>

        <!-- Section 2 : Coordonnées -->
        <fieldset>
            <legend>Coordonnées de contact</legend>
            
            <div class="form-group">
                <label for="email">Adresse Email :</label>
                <input type="email" id="email" name="email" placeholder="exemple@mail.com" required>
            </div>

            <div class="form-group">
                <label for="phone">Numéro de téléphone :</label>
                <input type="tel" id="phone" name="phone" placeholder="+33 6 00 00 00 00">
            </div>

            <div class="form-group">
                <label for="country">Pays :</label>
                <select id="country" name="country">
                    <option value="">-- Choisir un pays --</option>
                    <option value="france">France</option>
                    <option value="belgique">Belgique</option>
                    <option value="suisse">Suisse</option>
                    <option value="canada">Canada</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="address">Adresse postale :</label>
                <input type="text" id="address" name="address" placeholder="Rue, bâtiment, appartement">
            </div>
        </fieldset>

        <!-- Section 3 : Compte & Sécurité -->
        <fieldset>
            <legend>Sécurité du compte</legend>
            
            <div class="form-group">
                <label for="username">Nom d'utilisateur :</label>
                <input type="text" id="username" name="username" value="John Doe" required>
            </div>

            <div class="form-group">
                <label for="password">Mot de passe :</label>
                <input type="password" id="password" name="password" required minlength="8">
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirmer le mot de passe :</label>
                <input type="password" id="confirm_password" name="confirm_password" required>
            </div>

            <div class="form-group">
                <label for="security_question">Question de sécurité :</label>
                <select id="security_question" name="security_question">
                    <option value="maison">Quelle est la couleur de votre maison ?</option>
                    <option value="chien">Quel est le nom de votre premier animal ?</option>
                    <option value="ville">Quelle est votre ville de naissance ?</option>
                </select>
            </div>
        </fieldset>

        <!-- Section 4 : Préférences et Divers -->
        <fieldset>
            <legend>Préférences & Compétences</legend>
            
            <div class="form-group">
                <label for="skill_level">Niveau d'expertise (0-100) :</label>
                <input type="range" id="skill_level" name="skill_level" min="0" max="100" value="50">
            </div>

            <div class="form-group">
                <label for="favorite_color">Couleur préférée :</label>
                <input type="color" id="favorite_color" name="favorite_color">
            </div>

            <div class="form-group">
                <label for="portfolio">Lien vers votre portfolio (URL) :</label>
                <input type="url" id="portfolio" name="portfolio" placeholder="https://...">
            </div>

            <div class="form-group">
                <label>Centres d'intérêt :</label>
                <div class="checkbox-group">
                    <input type="checkbox" id="tech" name="interests" value="tech">
                    <label for="tech">Technologie</label>
                    <input type="checkbox" id="art" name="interests" value="art">
                    <label for="art">Art</label>
                    <input type="checkbox" id="sport" name="interests" value="sport">
                    <label for="sport">Sport</label>
                </div>
            </div>

            <div class="form-group">
                <label>S'abonner à la newsletter ? :</label>
                <div class="checkbox-group">
                    <input type="checkbox" id="newsletter" name="newsletter">
                    <label for="newsletter">Oui, je veux recevoir les actualités</label>
                </div>
            </div>
        </fieldset>

        <!-- Section 5 : Documents -->
        <fieldset>
            <legend>Documents</legend>
            <div class="form-group">
                <label for="cv">Télécharger votre CV (PDF uniquement) :</label>
                <input type="file" id="cv" name="cv" accept=".pdf">
            </div>
        </fieldset>

        <div class="submit-container">
            <button type="submit">S'inscrire maintenant</button>
            <button type="reset" style="background-color: #dc3545;">Réinitialiser</button>
        </div>

    </form>
</div>

</body>
</html>
